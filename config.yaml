# News Buddy — edit feeds and LLM settings to taste.

feeds:
  - name: MIT Tech Review AI
    url: https://www.technologyreview.com/feed/
  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
  - name: Ars Technica AI
    url: https://feeds.arstechnica.com/arstechnica/technology-lab

# Only articles whose title or summary contain these keywords are kept.
# Case-insensitive. Add or remove words to tune what gets through.
ai_keywords:
  - artificial intelligence
  - machine learning
  - deep learning
  - large language model
  - llm
  - generative ai
  - openai
  - anthropic
  - google deepmind
  - mistral
  - gemini
  - gpt
  - claude
  - neural network
  - ai model
  - ai agent
  - foundation model

output_dir: ~/news
lookback_hours: 24
max_items_per_feed: 10
max_articles: 5          # hard cap on articles summarized per run (protects API quota)
max_top_stories: 5
summary_style: "concise, neutral, 2-3 sentences"

rubric:
  enabled: true
  min_summary_length: 60     # minimum chars for a "complete" summary
  importance_penalty: 2      # subtracted from importance when rubric fails
  retry_on_failure: true     # retry once with a stricter prompt on failure

llm:
  provider: google           # "google" (free Gemini API) or "ollama" (local)
  main_model: gemini-2.5-flash       # unused by the LangGraph pipeline (summaries only)
  sub_model: gemini-2.5-flash        # summarizer — the only model this pipeline calls
  temperature: 0.2
  requests_per_minute: 14    # client-side throttle — free tier allows 15 RPM, 14 gives a safe buffer
  # For local Ollama instead, set provider: ollama and uncomment:
  # base_url: http://localhost:11434
  # main_model: llama3.1:8b
  # sub_model: llama3.2:3b
