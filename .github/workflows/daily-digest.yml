name: Daily News Digest

# Runs in GitHub's cloud — your laptop does NOT need to be on.
on:
  schedule:
    # 08:00 IST == 02:30 UTC (IST is UTC+5:30). GitHub cron uses UTC.
    - cron: "30 2 * * *"
  workflow_dispatch: {}   # trigger a manual test run from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # needed to push to gh-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the project
        run: |
          pip install --upgrade pip
          pip install .

      - name: Install chromadb
        run: pip install "chromadb==1.5.9"

      # Persist the dedup database between daily runs so the same article
      # is not summarised twice across overlapping 24h windows.
      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: state.db
          key: news-buddy-state-${{ github.run_id }}
          restore-keys: news-buddy-state-

      # Persist the RAG vector store so embeddings survive between runs.
      - name: Restore RAG vector store
        uses: actions/cache@v4
        with:
          path: chroma_db
          key: news-buddy-chroma-${{ github.run_id }}
          restore-keys: news-buddy-chroma-

      - name: Run the daily curation job
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m news_buddy run

      - name: Deploy digest to GitHub Pages
        run: |
          DATE=$(date -u +%F)
          NEWS_DIR="$HOME/news"

          if [ ! -f "${NEWS_DIR}/${DATE}.html" ]; then
            echo "No HTML file at ${NEWS_DIR}/${DATE}.html — skipping deploy"
            exit 0
          fi

          # Clone (or init) the gh-pages branch into a staging directory
          DEPLOY_DIR="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
              "$DEPLOY_DIR"
          else
            git -C "$DEPLOY_DIR" init -b gh-pages
            git -C "$DEPLOY_DIR" remote add origin \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi

          cp "${NEWS_DIR}/${DATE}.html" "${DEPLOY_DIR}/${DATE}.html"
          python -m news_buddy.archive_writer "$DEPLOY_DIR"

          cd "$DEPLOY_DIR"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing new to commit" && exit 0
          git commit -m "Digest ${DATE}"
          git push origin gh-pages
        env:
          DEPLOY_DIR: ${{ runner.temp }}/gh-pages-deploy
