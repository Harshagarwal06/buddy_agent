name: Daily News Digest

# Runs in GitHub's cloud — your laptop does NOT need to be on.
on:
  schedule:
    # 08:00 IST == 02:30 UTC (IST is UTC+5:30). GitHub cron uses UTC.
    - cron: "30 2 * * *"
  workflow_dispatch: {}   # lets you trigger a manual test run from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to push the gh-pages branch
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the project
        run: |
          python -m pip install --upgrade pip
          pip install .

      # Persist the dedup database between daily runs so the same article
      # isn't summarised twice across overlapping 24h windows.
      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: state.db
          key: news-buddy-state-${{ github.run_id }}
          restore-keys: news-buddy-state-

      - name: Run the daily curation job
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m news_buddy run

      - name: Deploy digest to GitHub Pages
        run: |
          DATE=$(date -u +%F)
          HTML_FILE="$HOME/news/${DATE}.html"
          if [ ! -f "$HTML_FILE" ]; then
            echo "No HTML file found at $HTML_FILE — skipping deploy"
            exit 0
          fi
          mkdir gh-pages-out
          cp "$HTML_FILE" gh-pages-out/index.html
          cd gh-pages-out
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Digest ${DATE}"
          git push --force \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages
